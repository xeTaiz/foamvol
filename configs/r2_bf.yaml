# Training
iterations: 10000
rays_per_batch: 1000000
init_points: 64000
final_points: 256000
activation_scale: 1.0
init_scale: 1.05
init_type: random
init_density: 2.0
device: cuda
debug: False
viewer: False
save_volume: False
dataset: r2_gaussian
data_path: r2_data/synthetic_dataset/cone_ntrain_75_angle_360/0_chest_cone

# Optimization
loss_type: l1
points_lr_init: 2e-4
points_lr_final: 5e-6
density_lr_init: 5e-2
density_lr_final: 1e-2
freeze_points: 9500
density_grad_clip: 10.0
tv_weight: 1e-3
tv_start: 0
tv_epsilon: 1e-4
tv_area_weighted: False
tv_border: False
tv_anneal: False
tv_on_raw: True
voxel_var_weight: 0.0
voxel_var_resolution: 32
voxel_var_sigma_v: 0.2
voxel_var_start: 0

# Densification
densify_from: 1000
densify_until: 6000
densify_factor: 1.15
gradient_fraction: 0.4
idw_fraction: 0.3
entropy_fraction: 0.3
entropy_bins: 5
contrast_alpha: 4.0
redundancy_threshold: 0.01
redundancy_cap: 0.05
targeted_fraction: 0.0
targeted_start: -1

# High-error sampling OFF
high_error_fraction: 0.0
high_error_power: 1.0
high_error_start: -1

# Interpolation
interpolation_start: 9000
interp_ramp: False
interp_sigma_scale: 0.7
interp_sigma_v: 0.2
per_cell_sigma: True
per_neighbor_sigma: True
bf_start: 5000
bf_until: 9000
bf_period: 10
bf_sigma_init: 2.0
bf_sigma_final: 0.5
bf_sigma_v_init: 3.0
bf_sigma_v_final: 0.01

# Gaussians
gaussian_start: -1
freeze_base_at_gaussian: False
joint_finetune_start: -1
peak_lr_init: 1e-2
peak_lr_final: 1e-3
offset_lr_init: 1e-3
offset_lr_final: 1e-4
cov_lr_init: 1e-2
cov_lr_final: 1e-3

# Linear Gradient
gradient_start: -1
gradient_lr_init: 1e-2
gradient_lr_final: 1e-3
gradient_warmup: 500
gradient_max_slope: 5.0
gradient_freeze_points: 500
