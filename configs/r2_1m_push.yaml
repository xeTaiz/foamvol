# Manual test: push-weight + variance pruning combo
# Based on sweep 25 findings (D04 + I14):
#   - nvar 1h w=3e-2 (3x past sweep 25 ceiling, fills gap between P01=2e-2 and P02=5e-2)
#   - sigma schedule si=50 -> sf=0.2 (best cushion in sweep 25)
#   - variance pruning adaptive cap 0.08 -> 0.01 (best surface metrics I14)

# Training
iterations: 10000
rays_per_batch: 1000000
init_points: 64000
final_points: 512000
activation_scale: 1.0
init_scale: 1.05
init_type: random
init_density: 2.0
init_volume_path: ""
device: cuda
debug: False
viewer: False
save_volume: False
dataset: r2_gaussian
data_path: r2_data/synthetic_dataset/cone_ntrain_75_angle_360/0_chest_cone

# Optimization
loss_type: l1
points_lr_init: 2e-4
points_lr_final: 5e-6
density_lr_init: 5e-2
density_lr_final: 1e-2
freeze_points: 9500
density_grad_clip: 10.0
tv_weight: 0.0
tv_start: 0
tv_epsilon: 1e-4
tv_area_weighted: False
tv_border: False
tv_anneal: False
tv_on_raw: True

# Regularization: neighbor-variance 1-hop, pushed weight + schedule
voxel_var_weight: 0.0
voxel_var_resolution: 64
voxel_var_start: 0
neighbor_var_weight: 3e-2
neighbor_var_hops: 1
neighbor_var_start: 0
var_sigma_v_init: 50.0
var_sigma_v_final: 0.2

# Densification (full: gradient + IDW + entropy)
densify_from: 1000
densify_until: 6000
densify_factor: 1.15
gradient_fraction: 0.4
idw_fraction: 0.3
entropy_fraction: 0.3
entropy_bins: 5
contrast_alpha: 0.0

# Variance-based pruning, adaptive cap (sweep 25 I14 winner)
redundancy_threshold: 0.0
redundancy_cap: 0.0
redundancy_cap_init: 0.08
redundancy_cap_final: 0.01
prune_variance_criterion: True
prune_hops: 1
targeted_fraction: 0.1
targeted_start: -1

# High-error sampling
high_error_fraction: 0.2
high_error_power: 1.0
high_error_start: -1

# Interpolation
interpolation_start: 9000
interp_ramp: False
interp_sigma_scale: 0.7
interp_sigma_v: 0.2
per_cell_sigma: True
per_neighbor_sigma: True
bf_start: -1
bf_until: 6000
bf_period: 10
bf_sigma_init: 2.0
bf_sigma_final: 0.3
bf_sigma_v_init: 10.0
bf_sigma_v_final: 0.1

# Gaussians OFF
gaussian_start: -1
freeze_base_at_gaussian: False
joint_finetune_start: -1
peak_lr_init: 1e-2
peak_lr_final: 1e-3
offset_lr_init: 1e-3
offset_lr_final: 1e-4
cov_lr_init: 1e-2
cov_lr_final: 1e-3

# Linear Gradient OFF
gradient_start: -1
gradient_lr_init: 1e-2
gradient_lr_final: 1e-3
gradient_warmup: 500
gradient_max_slope: 5.0
gradient_freeze_points: 500
