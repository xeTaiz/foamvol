# Stage 1: 16k -> 64k cells over 5000 steps.
# Run via:  python train.py -c configs/staged_stage1.yaml --experiment_name myrun/stage_1
# Or via:   python train_stages.py --configs configs/staged_stage1.yaml configs/staged_stage2.yaml --name myrun

# Dataset
dataset: r2_gaussian
data_path: r2_data/synthetic_dataset/cone_ntrain_75_angle_360/0_chest_cone

# Training
iterations: 5000
rays_per_batch: 1000000
device: cuda
debug: False
viewer: False
save_volume: False

# Points
init_points: 16000
final_points: 64000
activation_scale: 1.0
init_scale: 1.05
init_type: random
init_density: 2.0
init_volume_path: ""

# Optimization — LR init/final same as 10k configs; scheduler adapts to iterations
loss_type: l1
points_lr_init: 2e-4
points_lr_final: 5e-6
density_lr_init: 5e-2
density_lr_final: 1e-2
density_grad_clip: 10.0

# Phase schedule (proportional to 10k baseline: 10% / 60% / 90% / 95%)
densify_from: 500
densify_until: 3000
freeze_points: 4750
interpolation_start: 4500
interp_ramp: False
interp_sigma_scale: 0.7
interp_sigma_v: 0.2
per_cell_sigma: True
per_neighbor_sigma: True

# Densification
densify_factor: 1.15
gradient_fraction: 0.4
idw_fraction: 0.3
entropy_fraction: 0.3
entropy_bins: 5
contrast_alpha: 0.0
redundancy_threshold: 0.0
redundancy_cap: 0.0
redundancy_cap_init: 0.0
redundancy_cap_final: 0.0
prune_variance_criterion: False
prune_hops: 1

# Regularization
tv_weight: 0.0
tv_start: 2500
tv_epsilon: 1e-4
tv_area_weighted: False
tv_border: False
tv_anneal: False
tv_on_raw: True
voxel_var_weight: 1e-3
voxel_var_resolution: 64
voxel_var_start: 0
neighbor_var_weight: 0.0
neighbor_var_hops: 1
neighbor_var_start: 0
var_sigma_v_init: 0.2
var_sigma_v_final: 0.2

# Sampling
high_error_fraction: 0.2
high_error_power: 1.0
high_error_start: -1
targeted_fraction: 0.1
targeted_start: -1

# Bilateral filter OFF
bf_start: -1
bf_until: 3000
bf_period: 10
bf_sigma_init: 2.0
bf_sigma_final: 0.3
bf_sigma_v_init: 10.0
bf_sigma_v_final: 0.1

# Features OFF
gaussian_start: -1
freeze_base_at_gaussian: False
joint_finetune_start: -1
peak_lr_init: 1e-2
peak_lr_final: 1e-3
offset_lr_init: 1e-3
offset_lr_final: 1e-4
cov_lr_init: 1e-2
cov_lr_final: 1e-3
gradient_start: -1
gradient_lr_init: 1e-2
gradient_lr_final: 1e-3
gradient_warmup: 500
gradient_max_slope: 5.0
gradient_freeze_points: 500
