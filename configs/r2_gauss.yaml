# Pipeline
iterations: 10000
densify_from: 1000
densify_until: 6000
densify_factor: 1.15
gradient_fraction: 0.4
idw_fraction: 0.3
entropy_fraction: 0.3
entropy_bins: 5
contrast_alpha: 4.0
loss_type: l1
debug: False
viewer: False
save_volume: False
interpolation_start: -1
interp_ramp: False
interp_sigma_scale: 0.7
interp_sigma_v: 0.2
per_cell_sigma: True
per_neighbor_sigma: True
redundancy_threshold: 0.01
redundancy_cap: 0.05
rays_per_batch: 1000000

# Bilateral filter
bf_start: 5000
bf_until: 8000
bf_period: 10
bf_sigma_init: 2.0
bf_sigma_final: 0.5
bf_sigma_v_init: 3.0
bf_sigma_v_final: 0.01

# Model
init_points: 64000
final_points: 256000
activation_scale: 1.0
init_scale: 1.05
init_type: random
init_density: 2.0
device: cuda

# Optimization
points_lr_init: 2e-4
points_lr_final: 5e-6
density_lr_init: 5e-2
density_lr_final: 1e-2
freeze_points: 9500

tv_on_raw: True
tv_anneal: False
tv_weight: 1e-3
tv_start: 0
tv_epsilon: 1e-4
tv_area_weighted: False

density_grad_clip: 10.0
gradient_start: -1

# Gaussian peak parameters
gaussian_start: 8000
freeze_base_at_gaussian: True
joint_finetune_start: 9500
peak_lr_init: 1e-2
peak_lr_final: 1e-3
offset_lr_init: 1e-3
offset_lr_final: 1e-4
cov_lr_init: 1e-2
cov_lr_final: 1e-3

# Dataset
dataset: r2_gaussian
data_path: /mnt/hdd/r2_data/synthetic_dataset/cone_ntrain_75_angle_360/0_chest_cone
